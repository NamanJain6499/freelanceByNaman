name: Infrastructure CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/infrastructure*.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/infrastructure*.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy

env:
  TF_VERSION: '1.7.0'
  AWS_REGION: us-east-1

jobs:
  # Phase 1: Bootstrap (creates S3 backend for terraform state)
  bootstrap:
    name: Bootstrap Terraform Backend
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    permissions:
      id-token: write
      contents: read
    outputs:
      bootstrap-complete: ${{ steps.check.outputs.complete }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check/Create Bootstrap Resources
        id: check
        working-directory: infrastructure/terraform/bootstrap
        run: |
          terraform init
          terraform plan -detailed-exitcode -var="bucket_name=${{ secrets.TF_STATE_BUCKET }}" -var="dynamodb_table_name=${{ secrets.TF_LOCK_TABLE }}" 2>&1 || EXITCODE=$? && true
          if [ "$EXITCODE" -eq 2 ]; then
            echo "Changes needed, applying..."
            terraform apply -auto-approve -var="bucket_name=${{ secrets.TF_STATE_BUCKET }}" -var="dynamodb_table_name=${{ secrets.TF_LOCK_TABLE }}"
          fi
          echo "complete=true" >> $GITHUB_OUTPUT

  # Phase 2: Plan (runs on PR)
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: bootstrap
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=portfolio/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive infrastructure/terraform
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        working-directory: infrastructure/terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan -no-color \
            -var="domain_name=${{ secrets.DOMAIN_NAME }}" \
            -var="contact_form_to_email=${{ secrets.CONTACT_EMAIL }}" \
            -var="contact_form_from_email=noreply@${{ secrets.DOMAIN_NAME }}" \
            -var="s3_bucket_name=${{ secrets.S3_BUCKET_NAME || '' }}" \
            -var="enable_waf=${{ secrets.ENABLE_WAF || 'false' }}" \
            -var="enable_contact_form_email=${{ secrets.ENABLE_CONTACT_FORM || 'false' }}"
        continue-on-error: true

      - name: Update PR with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format 🖌️ \`${{ steps.fmt.outcome }}\`
            #### Terraform Validation ✅ \`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}*`

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"

  # Phase 3: Apply (runs on main branch merge or manual trigger)
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: bootstrap
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event.inputs.action == 'deploy')
    permissions:
      id-token: write
      contents: read
    outputs:
      bucket_name: ${{ steps.outputs.outputs.bucket_name }}
      distribution_id: ${{ steps.outputs.outputs.distribution_id }}
      api_endpoint: ${{ steps.outputs.outputs.api_endpoint }}
      cloudfront_domain: ${{ steps.outputs.outputs.cloudfront_domain }}
      site_url: ${{ steps.outputs.outputs.site_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=portfolio/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: |
          terraform apply -auto-approve \
            -var="domain_name=${{ secrets.DOMAIN_NAME }}" \
            -var="contact_form_to_email=${{ secrets.CONTACT_EMAIL }}" \
            -var="contact_form_from_email=noreply@${{ secrets.DOMAIN_NAME }}" \
            -var="s3_bucket_name=${{ secrets.S3_BUCKET_NAME || '' }}" \
            -var="enable_waf=${{ secrets.ENABLE_WAF || 'false' }}" \
            -var="enable_contact_form_email=${{ secrets.ENABLE_CONTACT_FORM || 'false' }}"

      - name: Capture Terraform Outputs
        id: outputs
        working-directory: infrastructure/terraform
        run: |
          echo "bucket_name=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "api_endpoint=$(terraform output -raw contact_form_api_endpoint)" >> $GITHUB_OUTPUT
          echo "cloudfront_domain=$(terraform output -raw cloudfront_domain_name)" >> $GITHUB_OUTPUT
          echo "site_url=$(terraform output -raw site_url)" >> $GITHUB_OUTPUT

      - name: Save Outputs as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-outputs
          path: |
            infrastructure-outputs.json
          retention-days: 30

      - name: Create Summary
        run: |
          echo "## Infrastructure Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | ${{ steps.outputs.outputs.bucket_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront ID | ${{ steps.outputs.outputs.distribution_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront Domain | ${{ steps.outputs.outputs.cloudfront_domain }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Endpoint | ${{ steps.outputs.outputs.api_endpoint }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Site URL | ${{ steps.outputs.outputs.site_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next:** Run the Service Deployment workflow to deploy your frontend" >> $GITHUB_STEP_SUMMARY

  # Phase 4: Destroy (manual only)
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    permissions:
      id-token: write
      contents: read
    environment:
      name: production
      url: ${{ steps.outputs.outputs.site_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=portfolio/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        working-directory: infrastructure/terraform
        run: |
          terraform destroy -auto-approve \
            -var="domain_name=${{ secrets.DOMAIN_NAME }}" \
            -var="contact_form_to_email=${{ secrets.CONTACT_EMAIL }}" \
            -var="contact_form_from_email=noreply@${{ secrets.DOMAIN_NAME }}" \
            -var="s3_bucket_name=${{ secrets.S3_BUCKET_NAME || '' }}" \
            -var="enable_waf=${{ secrets.ENABLE_WAF || 'false' }}" \
            -var="enable_contact_form_email=${{ secrets.ENABLE_CONTACT_FORM || 'false' }}"
