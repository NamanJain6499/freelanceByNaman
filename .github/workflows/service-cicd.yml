name: Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app/frontend/**'
      - 'infrastructure/lambda/**'
      - '.github/workflows/service*.yml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend-only
          - lambda-only

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # Job 1: Fetch Infrastructure Outputs (reusable)
  get-infra-outputs:
    name: Get Infrastructure Outputs
    runs-on: ubuntu-latest
    outputs:
      bucket_name: ${{ steps.infra.outputs.bucket_name }}
      distribution_id: ${{ steps.infra.outputs.distribution_id }}
      api_endpoint: ${{ steps.infra.outputs.api_endpoint }}
      cloudfront_domain: ${{ steps.infra.outputs.cloudfront_domain }}
      site_url: ${{ steps.infra.outputs.site_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Get Outputs from Terraform State
        id: infra
        working-directory: infrastructure/terraform
        run: |
          # Initialize terraform with remote backend to read outputs
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=portfolio/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

          # Read outputs
          echo "bucket_name=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "api_endpoint=$(terraform output -raw contact_form_api_endpoint)" >> $GITHUB_OUTPUT
          echo "cloudfront_domain=$(terraform output -raw cloudfront_domain_name)" >> $GITHUB_OUTPUT
          echo "site_url=$(terraform output -raw site_url)" >> $GITHUB_OUTPUT

      - name: Verify Outputs
        run: |
          echo "S3 Bucket: ${{ steps.infra.outputs.bucket_name }}"
          echo "CloudFront ID: ${{ steps.infra.outputs.distribution_id }}"
          echo "API Endpoint: ${{ steps.infra.outputs.api_endpoint }}"

  # Job 2: Build and Deploy Frontend
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: get-infra-outputs
    if: github.event.inputs.deploy_target != 'lambda-only'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Create Environment File
        working-directory: app/frontend
        run: |
          echo "VITE_CONTACT_API_URL=${{ needs.get-infra-outputs.outputs.api_endpoint }}" > .env.production
          echo "VITE_SITE_URL=${{ needs.get-infra-outputs.outputs.site_url }}" >> .env.production
          cat .env.production

      - name: Build Application
        working-directory: app/frontend
        run: npm run build

      - name: Deploy to S3 (Assets with Cache)
        run: |
          echo "Deploying hashed assets to S3..."
          aws s3 sync app/frontend/dist/ s3://${{ needs.get-infra-outputs.outputs.bucket_name }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.txt" \
            --exclude "*.xml" \
            --exclude "_redirects"

      - name: Deploy to S3 (HTML with No Cache)
        run: |
          echo "Deploying HTML files to S3..."
          aws s3 sync app/frontend/dist/ s3://${{ needs.get-infra-outputs.outputs.bucket_name }}/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --include "*.html" \
            --exclude "*"

      - name: Deploy to S3 (Other Files)
        run: |
          echo "Deploying other static files..."
          aws s3 sync app/frontend/dist/ s3://${{ needs.get-infra-outputs.outputs.bucket_name }}/ \
            --cache-control "public, max-age=86400" \
            --include "*.txt" \
            --include "*.xml" \
            --include "_redirects" \
            --exclude "*"

      - name: Invalidate CloudFront Cache
        run: |
          echo "Creating CloudFront invalidation..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.get-infra-outputs.outputs.distribution_id }} \
            --paths "/index.html" "/" "/404.html" \
            --query 'Invalidation.Id' \
            --output text

      - name: Wait for CloudFront Invalidation
        run: |
          echo "Waiting for CloudFront invalidation to complete..."
          sleep 30
          echo "Invalidation in progress (usually takes 1-5 minutes)"

      - name: Frontend Deploy Summary
        run: |
          echo "## Frontend Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | ${{ needs.get-infra-outputs.outputs.bucket_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront ID | ${{ needs.get-infra-outputs.outputs.distribution_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Site URL | ${{ needs.get-infra-outputs.outputs.site_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** CloudFront invalidation is in progress (1-5 minutes)" >> $GITHUB_STEP_SUMMARY

  # Job 3: Deploy Lambda Functions
  deploy-lambda:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    needs: get-infra-outputs
    if: github.event.inputs.deploy_target != 'frontend-only'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and Deploy Contact Form Lambda
        working-directory: infrastructure/lambda
        run: |
          # Create deployment package
          pip install -r requirements.txt -t package/ 2>/dev/null || true
          cd package && zip -r ../contact-form.zip . && cd ..
          zip -j contact-form.zip contact-form.py

          # Get Lambda function name from Terraform outputs
          terraform -chdir=../terraform output -raw contact_form_lambda_name 2>/dev/null || echo "contact-form"

          # Update Lambda function code
          aws lambda update-function-code \
            --function-name "${{ secrets.PROJECT_NAME || 'portfolio' }}-prod-contact-form" \
            --zip-file fileb://contact-form.zip \
            --query 'FunctionArn' \
            --output text

          echo "Lambda function updated successfully"

      - name: Verify Lambda Update
        run: |
          aws lambda get-function \
            --function-name "${{ secrets.PROJECT_NAME || 'portfolio' }}-prod-contact-form" \
            --query 'Configuration.LastUpdateStatus' \
            --output text

      - name: Lambda Deploy Summary
        run: |
          echo "## Lambda Functions Updated ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Contact Form Lambda: \"${{ secrets.PROJECT_NAME || 'portfolio' }}-prod-contact-form\"" >> $GITHUB_STEP_SUMMARY

  # Job 4: Final Summary
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [get-infra-outputs, deploy-frontend, deploy-lambda]
    if: always() && needs.get-infra-outputs.result == 'success'

    steps:
      - name: Final Summary
        run: |
          echo "## Service Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Site URL:** ${{ needs.get-infra-outputs.outputs.site_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** ${{ needs.deploy-frontend.result == 'success' && '✅ Deployed' || needs.deploy-frontend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Lambda:** ${{ needs.deploy-lambda.result == 'success' && '✅ Deployed' || needs.deploy-lambda.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CloudFront domain: ${{ needs.get-infra-outputs.outputs.cloudfront_domain }}" >> $GITHUB_STEP_SUMMARY
